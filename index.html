<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rashikian</title>
    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html {
            scroll-behavior: smooth;
            background-color: #000000;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 400;
            line-height: 1.5;
            color: #FFFFFF;
            background-color: #000000;
            padding-top: 56px;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 300;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        /* NAVIGATION BAR */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .brand {
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 0.12em;
            color: #FFFFFF;
            text-transform: uppercase;
        }

        #menuBtn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px;
            transition: all 0.2s ease;
            border-radius: 0;
        }

        #menuBtn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        #menuBtn span {
            display: block;
            width: 18px;
            height: 1.5px;
            background-color: #FFFFFF;
        }

        /* HERO (GAME IFRAME) */
        .hero {
            height: calc(100vh - 56px);
            width: 100%;
            overflow: hidden;
            position: relative;
            background-color: #000000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .hero iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* TAGLINE STRIP */
        #about {
            padding: 80px 24px;
            text-align: center;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .tagline-logo {
            height: 48px;
            width: auto;
            opacity: 1;
        }

        #about p {
            font-size: clamp(18px, 3vw, 28px);
            font-weight: 300;
            letter-spacing: 0.02em;
            color: rgba(255, 255, 255, 0.85);
            max-width: 800px;
        }

        /* PRODUCTS SECTION */
        .products-section {
            padding: 0 24px 96px 24px;
            max-width: 960px;
            margin: 0 auto;
            background-color: #000000;
        }

        .section-label {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.18em;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 16px;
        }

        .product-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: opacity 0.2s ease;
        }

        .product-card:hover {
            opacity: 0.5;
        }

        .product-info {
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 20px;
            font-weight: 400;
            color: #FFFFFF;
        }

        .product-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 6px;
        }

        .product-arrow {
            font-size: 20px;
            color: #888888;
        }

        /* FOOTER */
        footer {
            padding: 32px 24px;
            background-color: #000000;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .footer-left, .footer-right {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
        }

        /* MENU OVERLAY */
        #menuOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            padding: 0 32px;
        }

        #closeBtn {
            position: absolute;
            top: 20px;
            right: 24px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        #closeBtn:hover {
            color: #FFFFFF;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            font-size: clamp(32px, 8vw, 56px);
            font-weight: 300;
            color: #FFFFFF;
            padding: 8px 0;
            letter-spacing: -0.01em;
            line-height: 1.15;
            transition: color 0.2s ease;
        }

        .menu-item:hover {
            color: #888888;
        }

        .menu-footer {
            position: absolute;
            bottom: 32px;
            left: 32px;
            font-size: 12px;
            color: #888888;
        }

        .menu-footer .brand-inline {
            letter-spacing: 0.08em;
            color: #888888;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            nav {
                padding: 0 16px;
            }
            .products-section {
                padding: 0 16px 64px 16px;
            }
            footer {
                padding: 24px 16px;
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <nav>
        <span class="brand">RASHIKIAN</span>
        <button id="menuBtn">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <section class="hero">
        <iframe src="game/index.html" scrolling="no" allow="autoplay"></iframe>
    </section>

    <section id="about">
        <img src="input_file_0.png" alt="Rashikian Logo" class="tagline-logo">
        <p>A technology company building toward aerospace.</p>
    </section>

    <section class="products-section">
        <div class="section-label">Products</div>
        
        <a href="https://readersonic.com" target="_blank" class="product-card">
            <div class="product-info">
                <span class="product-name">Readersonic</span>
                <span class="product-desc">A speed-reading tool with a built-in community of writers and readers.</span>
            </div>
            <div class="product-arrow">↗</div>
        </a>
    </section>

    <footer>
        <div class="footer-left">© 2025 Rashikian</div>
        <div class="footer-right">rashikian.com</div>
    </footer>

    <div id="menuOverlay">
        <button id="closeBtn">✕</button>
        <div class="menu-items">
            <a href="https://readersonic.com" target="_blank" class="menu-item">Try Readersonic ↗</a>
            <a href="#about" id="aboutLink" class="menu-item">About</a>
        </div>
        <p class="menu-footer"><span class="brand-inline">Rashikian</span> — A technology company building toward aerospace.</p>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menuOverlay = document.getElementById('menuOverlay');
        const closeBtn = document.getElementById('closeBtn');
        const aboutLink = document.getElementById('aboutLink');

        menuBtn.addEventListener('click', () => {
            menuOverlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });

        closeBtn.addEventListener('click', () => {
            menuOverlay.style.display = 'none';
            document.body.style.overflow = '';
        });

        aboutLink.addEventListener('click', () => {
            menuOverlay.style.display = 'none';
            document.body.style.overflow = '';
        });
    </script>
</body>
</html>
